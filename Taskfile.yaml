# https://taskfile.dev
version: '3'

vars:
  NAME: status
  BIN_DIR: bin
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list

  clean:
    desc: Remove the build artifacts directory
    cmds:
      - rm -rf {{.BIN_DIR}}

  deps:
    desc: Download Go module dependencies
    cmds:
      - go mod download

  build:
    desc: Build the application with race detector
    deps: [clean]
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -race -ldflags="-X 'github.com/willis7/service_status/cmd.Version={{.VERSION}}'" -o {{.BIN_DIR}}/{{.NAME}}

  run:
    desc: Run the application directly (development)
    cmds:
      - go run main.go config.json

  start:
    desc: Run the compiled binary
    deps: [build]
    cmds:
      - ./{{.BIN_DIR}}/{{.NAME}} config.json

  test:
    desc: Run all tests with race detector
    cmds:
      - go test -race -v ./...

  coverage:
    desc: Run all tests with coverage
    cmds:
      - go test -race -cover -v ./...

  vet:
    desc: Run go vet static analysis
    cmds:
      - go vet ./...

  lint:
    desc: Run golint
    cmds:
      - golint ./...

  docker-build:
    desc: Build Docker image
    cmds:
      - docker build --rm -t willis7/status .

  docker-run:
    desc: Run Docker container
    deps: [docker-build]
    cmds:
      - docker run -i -t willis7/status

  check:
    desc: Run all quality checks (vet, lint, test)
    deps: [vet, lint, test]

  all:
    desc: Run full build pipeline (deps, check, build)
    deps: [deps, check, build]
